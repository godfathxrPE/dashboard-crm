[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js Runtime (SSR/middleware/API routes). Без явного plugin-entry Netlify
# публиковал .next как статику → 404 на всех роутах (первый деплой 2026-07-11).
# Netlify устанавливает плагин сам на этапе билда — npm-зависимость не нужна.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers (хвост из delivery-хендоффа 2026-07-11).
# Полный CSP с nonce для inline theme-init script — отдельная задача; здесь только
# CSP-lite (object-src/base-uri/frame-ancestors), который ничего не ломает.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
